<svg width="800" height="510" viewBox="0 0 800 510" xmlns="http://www.w3.org/2000/svg"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">

  <!-- Background -->
  <rect width="800" height="510" fill="#0d1117"/>

  <!-- ── Header ── -->
  <rect width="800" height="50" fill="#161b22"/>
  <line x1="0" y1="50" x2="800" y2="50" stroke="#30363d" stroke-width="1"/>
  <text x="28" y="32" font-size="17" font-weight="700" fill="#e6edf3">ClaudeMeter</text>
  <text x="142" y="32" font-size="12" fill="#8b949e">Claude Code API usage monitor</text>

  <!-- ── Card 1: 5h Session (85 %, red) ── -->
  <rect x="60" y="65" width="330" height="390" rx="14" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="80" y="95" font-size="10" font-weight="700" fill="#8b949e" letter-spacing="1">5H SESSION</text>

  <!-- Gauge track -->
  <circle cx="225" cy="190" r="76" fill="none" stroke="#21262d" stroke-width="22"/>
  <!-- Arc: 85 % of 477.52 → 405.89 -->
  <circle cx="225" cy="190" r="76" fill="none" stroke="#f85149" stroke-width="22"
          stroke-dasharray="405.89 71.63" stroke-linecap="round"
          transform="rotate(-90 225 190)"/>
  <text x="225" y="182" font-size="26" font-weight="700" fill="#e6edf3" text-anchor="middle">85.0%</text>
  <text x="225" y="204" font-size="12" fill="#8b949e" text-anchor="middle">— / —</text>

  <!-- Reset -->
  <text x="225" y="298" font-size="10" font-weight="600" fill="#8b949e" text-anchor="middle" letter-spacing="0.7">RESETS IN</text>
  <text x="225" y="321" font-size="20" font-weight="500" fill="#f85149" text-anchor="middle">42m</text>

  <!-- Sparkline (sharply rising to 85 %) -->
  <text x="80" y="344" font-size="9" font-weight="600" fill="#8b949e" letter-spacing="0.7" opacity="0.7">1H TREND</text>
  <polygon points="80,393 80,377 109,375 138,373 167,371 196,369 225,367 254,364 283,362 312,360 341,359 370,359 370,393"
           fill="#f85149" opacity="0.12"/>
  <polyline points="80,377 109,375 138,373 167,371 196,369 225,367 254,364 283,362 312,360 341,359 370,359"
            fill="none" stroke="#f85149" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- ── Card 2: 7 Day (22 %, green) ── -->
  <rect x="410" y="65" width="330" height="390" rx="14" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="430" y="95" font-size="10" font-weight="700" fill="#8b949e" letter-spacing="1">7 DAY</text>

  <!-- Gauge track -->
  <circle cx="575" cy="190" r="76" fill="none" stroke="#21262d" stroke-width="22"/>
  <!-- Arc: 22 % → 105.05 -->
  <circle cx="575" cy="190" r="76" fill="none" stroke="#3fb950" stroke-width="22"
          stroke-dasharray="105.05 372.47" stroke-linecap="round"
          transform="rotate(-90 575 190)"/>
  <text x="575" y="182" font-size="26" font-weight="700" fill="#e6edf3" text-anchor="middle">22.0%</text>
  <text x="575" y="204" font-size="12" fill="#8b949e" text-anchor="middle">— / —</text>

  <!-- Reset -->
  <text x="575" y="298" font-size="10" font-weight="600" fill="#8b949e" text-anchor="middle" letter-spacing="0.7">RESETS IN</text>
  <text x="575" y="321" font-size="20" font-weight="500" fill="#3fb950" text-anchor="middle">4d 12h</text>

  <!-- Sparkline (stable) -->
  <text x="430" y="344" font-size="9" font-weight="600" fill="#8b949e" letter-spacing="0.7" opacity="0.7">1H TREND</text>
  <polygon points="430,393 430,390 459,390 488,390 517,389 546,389 575,389 604,389 633,389 662,388 691,388 720,388 720,393"
           fill="#3fb950" opacity="0.12"/>
  <polyline points="430,390 459,390 488,390 517,389 546,389 575,389 604,389 633,389 662,388 691,388 720,388"
            fill="none" stroke="#3fb950" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- ── Toast notification ── -->
  <rect x="530" y="72" width="230" height="56" rx="10" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <rect x="530" y="72" width="4" height="56" rx="2" fill="#f85149"/>
  <text x="545" y="93" font-size="11" font-weight="600" fill="#e6edf3">ClaudeMeter — Usage Warning</text>
  <text x="545" y="111" font-size="11" fill="#8b949e">5h budget at 85.0% — approaching limit</text>

  <!-- ── Footer ── -->
  <line x1="0" y1="470" x2="800" y2="470" stroke="#30363d" stroke-width="1"/>
  <circle cx="36" cy="490" r="3.5" fill="#f85149"/>
  <text x="48" y="494" font-size="12" fill="#8b949e">API error: usage at 85%</text>
  <rect x="220" y="479" width="84" height="22" rx="5" fill="none" stroke="#30363d" stroke-width="1"/>
  <text x="262" y="494" font-size="11" fill="#8b949e" text-anchor="middle">Refresh now</text>
  <text x="562" y="494" font-size="12" fill="#8b949e">Updated 5s ago</text>
  <text x="656" y="494" font-size="12" fill="#30363d">|</text>
  <circle cx="671" cy="490" r="5.5" fill="none" stroke="#30363d" stroke-width="2"/>
  <path d="M 671 484.5 A 5.5 5.5 0 0 1 676.5 490" fill="none" stroke="#58a6ff" stroke-width="2" stroke-linecap="round"/>
  <text x="686" y="494" font-size="12" fill="#8b949e">Refresh in 55s</text>

</svg>
